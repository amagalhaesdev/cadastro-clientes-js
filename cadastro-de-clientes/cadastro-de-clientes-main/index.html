<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Clientes</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <h2>Clientes</h2>
      <form>
        <input
          type="text"
          id="cliente"
          placeholder="Cadastrar Cliente"
          required
        />

        <input
          type="text"
          id="email"
          placeholder="Inserir o Email do Cliente"
          required
        />

        <button id="add" type="button">Cadastrar</button>
      </form>

      <ul id="listaClientes"></ul>
    </main>
    <script src="script.js"></script>
  </body>
</html>
